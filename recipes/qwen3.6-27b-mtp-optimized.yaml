model: Qwen/Qwen3.6-27B-MTP-GGUF:Q8_0
runtime: llama-cpp
max_nodes: 1
metadata:
  description: Qwen3.6-27B MTP optimized for DGX Spark (Blackwell/GB10) — native MTP heads with draft-mtp speculation.
  maintainer: dgxguy
  model_params: "27B"
  model_dtype: q8_0
  kv_dtype: bfloat16
  num_layers: 64
  num_kv_heads: 8
  head_dim: 128

defaults:
  port: 8080
  host: 0.0.0.0
  n_gpu_layers: 99
  ctx_size: 32000
  n_threads: 40
  n_threads_batch: 40
  batch_size: 4096
  temp: 0.6
  spec_type: draft-mtp
  spec_draft_n_max: 2
  spec_draft_p_min: 0.75

env:
  LD_LIBRARY_PATH: /usr/local/cuda-13.0/targets/sbsa-linux/lib

command: |
  llama-server \
    -m {model} \
    --host {host} \
    --port {port} \
    --n-gpu-layers {n_gpu_layers} \
    --ctx-size {ctx_size} \
    -t {n_threads} \
    -tb {n_threads_batch} \
    -b {batch_size} \
    --jinja \
    --temp {temp} \
    --spec-type {spec_type} \
    --spec-draft-n-max {spec_draft_n_max} \
    --spec-draft-p-min {spec_draft_p_min}
